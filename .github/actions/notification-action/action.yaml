name: Email and Slack Notification
description: Send an optional email and Slack notification for failed pipelines.

inputs:
  pipeline_name:
    required: true
  repository_name:
    required: true
  failure_reason:
    required: true
  author:
    required: true
  smtp_username:
    required: false
    default: ""
  smtp_password:
    required: false
    default: ""
  mail_from:
    required: false
    default: ""
  mail_to:
    required: false
    default: ""
  slack_webhook:
    required: false
    default: ""
  workflow_url:
    required: true
  report_url:
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Send email
      if: ${{ inputs.smtp_username != '' && inputs.smtp_password != '' && inputs.mail_from != '' && inputs.mail_to != '' }}
      uses: hilarion5/send-mail@v1
      with:
        smtp-server: smtp.hostinger.com
        smtp-port: 587
        smtp-secure: false
        username: ${{ inputs.smtp_username }}
        password: ${{ inputs.smtp_password }}
        from-email: "KairoAI Pipeline Alerts <${{ inputs.mail_from }}>"
        to-email: ${{ inputs.mail_to }}
        subject: "[KairoAI ALERT] ${{ inputs.pipeline_name }} FAILED - ${{ inputs.repository_name }}"
        html: |
          <div style="padding:24px;background:#f6f8fa;font-family:Arial,sans-serif;color:#111827;">
            <h2 style="color:#b91c1c;">Pipeline Failure</h2>
            <p><b>Pipeline:</b> ${{ inputs.pipeline_name }}</p>
            <p><b>Repository:</b> ${{ inputs.repository_name }}</p>
            <p><b>Author:</b> ${{ inputs.author }}</p>
            <p><b>Reason:</b> ${{ inputs.failure_reason }}</p>
            <p>
              <a href="${{ inputs.workflow_url }}"
                 style="padding:10px 14px;background:#111827;color:#fff;text-decoration:none;border-radius:6px;">
                View Workflow
              </a>
            </p>
          </div>

    - name: Post to Slack
      if: ${{ inputs.slack_webhook != '' }}
      uses: slackapi/slack-github-action@v3.0.1
      with:
        webhook: ${{ inputs.slack_webhook }}
        webhook-type: incoming-webhook
        payload: |
          attachments:
            - color: "#dc2626"
              blocks:
                - type: header
                  text:
                    type: plain_text
                    text: "KairoAI Pipeline Failure"
                - type: section
                  fields:
                    - type: mrkdwn
                      text: "*Pipeline*\n${{ inputs.pipeline_name }}"
                    - type: mrkdwn
                      text: "*Repository*\n${{ inputs.repository_name }}"
                    - type: mrkdwn
                      text: "*Author*\n${{ inputs.author }}"
                    - type: mrkdwn
                      text: "*Failure Reason*\n${{ inputs.failure_reason }}"
                - type: actions
                  elements:
                    - type: button
                      text:
                        type: plain_text
                        text: "View Workflow"
                      url: "${{ inputs.workflow_url }}"
